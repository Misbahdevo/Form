<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Repurposer</title>
    <!-- Use Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>AI Content Repurposer</h1>
            <p>Enter your YouTube video link and instantly get AI-generated content including a detailed blog post, a LinkedIn post with caption and image, and ready-to-publish short video clips with captions for TikTok and Instagram.</p>
        </header>

        <form action="https://your-webhook-url-here" method="POST">
            <div class="form-group">
                <label for="youtube-url">YouTube Video URL <span class="required">*</span></label>
                <input type="url" id="youtube-url" name="youtube-url" placeholder="https://www.youtube.com/watch?v=..." required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="website-url">Website URL <span class="optional">(optional)</span></label>
                <input type="url" id="website-url" name="website-url" placeholder="https://yourwebsite.com">
            </div>

            <div class="form-group">
                <label for="linkedin-url">LinkedIn Profile URL <span class="optional">(optional)</span></label>
                <input type="url" id="linkedin-url" name="linkedin-url" placeholder="https://linkedin.com/in/yourprofile">
            </div>

            <button type="submit" class="submit-btn">Generate Content</button>
        </form>
    </main>
</body>
</html>
